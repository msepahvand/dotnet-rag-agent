# ADOT Collector configuration for the ECS sidecar.
# Receives OTLP traces from the API container (localhost:4317/4318) and
# exports them to AWS X-Ray. The collector inherits the AWS region from the
# ECS task's IAM role — no region field needed in the exporter.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

exporters:
  awsxray:

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [awsxray]
