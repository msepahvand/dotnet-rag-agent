version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: vector-search-qdrant
    ports:
      - "6333:6333"  # HTTP API
      - "6334:6334"  # gRPC API
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis/redis-stack:latest
    container_name: vector-search-redis
    ports:
      - "6379:6379"  # Redis
      - "8001:8001"  # RedisInsight
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: VectorSearch.Api/Dockerfile
    container_name: vector-search-api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - VectorStore__Provider=Qdrant
      - VectorStore__Qdrant__Url=http://qdrant:6333
      - VectorStore__Qdrant__CollectionName=posts
      - VectorStore__Qdrant__VectorSize=1024
    depends_on:
      qdrant:
        condition: service_healthy

volumes:
  qdrant_storage:
  redis_data:
    driver: local
