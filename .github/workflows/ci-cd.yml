
name: CI/CD

permissions:
  id-token: write
  contents: read

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  infrastructure:
    name: Deploy infrastructure
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set AWS region
        run: |
          echo "AWS_REGION=${{ secrets.AWS_REGION || 'us-east-1' }}" >> $GITHUB_ENV

      - name: Validate AWS region
        run: |
          if [ -z "$AWS_REGION" ]; then
            echo "AWS_REGION is required but was not provided" >&2
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_INFRA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: '1.5.0'
          terraform_wrapper: false

      - name: Import existing S3 Vectors resources (migration)
        working-directory: infra
        run: |
          export TF_VAR_github_repo="${{ github.repository }}"
          export TF_VAR_github_branch="${{ github.ref }}"
          export TF_VAR_aws_region="${AWS_REGION:-us-east-1}"

          terraform init -reconfigure

          REGION="${AWS_REGION:-us-east-1}"
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

          VECTOR_BUCKET_NAME=$(terraform output -raw vector_bucket_name 2>/dev/null || echo "posts-semantic-search")
          VECTOR_INDEX_NAME=$(terraform output -raw vector_index_name 2>/dev/null || echo "posts-content-index")
          ECR_REPOSITORY_NAME=$(terraform output -raw ecr_repository_name 2>/dev/null || echo "dotnet-vector-search")
          APP_RUNNER_SERVICE_NAME="${{ secrets.APP_RUNNER_SERVICE_NAME || 'dotnet-vector-search' }}"

          BUCKET_ADDRESS="module.s3_vectors.aws_s3vectors_vector_bucket.vector_bucket"
          INDEX_ADDRESS="module.s3_vectors.aws_s3vectors_index.vector_index"
          ECR_ADDRESS="aws_ecr_repository.api"
          APP_RUNNER_ADDRESS="aws_apprunner_service.api"

          if ! terraform state show "$BUCKET_ADDRESS" >/dev/null 2>&1; then
            BUCKET_FOUND=$(aws s3vectors list-vector-buckets \
              --region "$REGION" \
              --query "vectorBuckets[?vectorBucketName=='$VECTOR_BUCKET_NAME'].vectorBucketName | [0]" \
              --output text)

            if [ "$BUCKET_FOUND" != "None" ] && [ -n "$BUCKET_FOUND" ]; then
              terraform import "$BUCKET_ADDRESS" "arn:aws:s3vectors:$REGION:$ACCOUNT_ID:bucket/$VECTOR_BUCKET_NAME"
            fi
          fi

          if ! terraform state show "$INDEX_ADDRESS" >/dev/null 2>&1; then
            INDEX_FOUND=$(aws s3vectors list-indexes \
              --region "$REGION" \
              --vector-bucket-name "$VECTOR_BUCKET_NAME" \
              --query "indexes[?indexName=='$VECTOR_INDEX_NAME'].indexName | [0]" \
              --output text)

            if [ "$INDEX_FOUND" != "None" ] && [ -n "$INDEX_FOUND" ]; then
              terraform import "$INDEX_ADDRESS" "arn:aws:s3vectors:$REGION:$ACCOUNT_ID:bucket/$VECTOR_BUCKET_NAME/index/$VECTOR_INDEX_NAME"
            fi
          fi

          if ! terraform state show "$ECR_ADDRESS" >/dev/null 2>&1; then
            if aws ecr describe-repositories --region "$REGION" --repository-names "$ECR_REPOSITORY_NAME" >/dev/null 2>&1; then
              terraform import "$ECR_ADDRESS" "$ECR_REPOSITORY_NAME"
            fi
          fi

          if ! terraform state show "$APP_RUNNER_ADDRESS" >/dev/null 2>&1; then
            APP_RUNNER_ARN=$(aws apprunner list-services \
              --region "$REGION" \
              --query "ServiceSummaryList[?ServiceName=='$APP_RUNNER_SERVICE_NAME'].ServiceArn | [0]" \
              --output text)

            if [ "$APP_RUNNER_ARN" != "None" ] && [ -n "$APP_RUNNER_ARN" ]; then
              terraform import "$APP_RUNNER_ADDRESS" "$APP_RUNNER_ARN"
            fi
          fi

      - name: Terraform apply
        working-directory: infra
        run: |
          terraform init -reconfigure

          terraform apply -auto-approve \
            -var="github_repo=${{ github.repository }}" \
            -var="github_branch=${{ github.ref }}" \
            -var="aws_region=${{ env.AWS_REGION }}"

      - name: Verify S3 Vectors resources
        working-directory: infra
        run: |
          REGION="${AWS_REGION:-us-east-1}"

          VECTOR_BUCKET_NAME=$(terraform output -raw vector_bucket_name)
          VECTOR_INDEX_NAME=$(terraform output -raw vector_index_name)

          echo "Verifying S3 Vectors resources in region: $REGION"
          echo "Expected bucket: $VECTOR_BUCKET_NAME"
          echo "Expected index: $VECTOR_INDEX_NAME"

          BUCKET_FOUND=$(aws s3vectors list-vector-buckets \
            --region "$REGION" \
            --query "vectorBuckets[?vectorBucketName=='$VECTOR_BUCKET_NAME'].vectorBucketName | [0]" \
            --output text)

          if [ "$BUCKET_FOUND" = "None" ] || [ -z "$BUCKET_FOUND" ]; then
            echo "S3 Vectors bucket '$VECTOR_BUCKET_NAME' was not found in region '$REGION'." >&2
            exit 1
          fi

          INDEX_FOUND=$(aws s3vectors list-indexes \
            --region "$REGION" \
            --vector-bucket-name "$VECTOR_BUCKET_NAME" \
            --query "indexes[?indexName=='$VECTOR_INDEX_NAME'].indexName | [0]" \
            --output text)

          if [ "$INDEX_FOUND" = "None" ] || [ -z "$INDEX_FOUND" ]; then
            echo "S3 Vectors index '$VECTOR_INDEX_NAME' was not found in bucket '$VECTOR_BUCKET_NAME' (region '$REGION')." >&2
            exit 1
          fi

          echo "S3 Vectors verification succeeded: bucket and index are present."

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        # restore all projects via solution to ensure test project packages are restored
        run: dotnet restore VectorSearch.Api.sln

      - name: Build entire solution
        run: dotnet build VectorSearch.Api.sln --configuration Release --no-restore

      - name: Run integration tests
        run: |
          # build will run automatically so we don't need --no-build
          dotnet test VectorSearch.IntegrationTests/VectorSearch.IntegrationTests.csproj \
            --configuration Release --verbosity normal

  deploy:
    name: Deploy to App Runner
    needs:
      - build-and-test
      - infrastructure
    runs-on: ubuntu-latest
    # run only after successful build + infra jobs on push events to primary branches
    if: github.event_name == 'push' && needs.build-and-test.result == 'success' && needs.infrastructure.result == 'success' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set AWS region
        run: |
          echo "AWS_REGION=${{ secrets.AWS_REGION || 'us-east-1' }}" >> $GITHUB_ENV

      - name: Validate AWS region
        run: |
          if [ -z "$AWS_REGION" ]; then
            echo "AWS_REGION is required but was not provided" >&2
            exit 1
          fi
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_INFRA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
        env:
          AWS_REGION: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Resolve deploy variables
        run: |
          AWS_REGION_VALUE="${AWS_REGION:-us-east-1}"
          AWS_ACCOUNT_ID_VALUE="${{ secrets.AWS_ACCOUNT_ID }}"
          ECR_REPOSITORY_VALUE="${{ secrets.ECR_REPOSITORY || 'dotnet-vector-search' }}"
          IMAGE_TAG_VALUE="${GITHUB_SHA::12}-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}"
          APP_RUNNER_SERVICE_NAME_VALUE="${{ secrets.APP_RUNNER_SERVICE_NAME || 'dotnet-vector-search' }}"
          APP_RUNNER_SERVICE_ARN_VALUE="${{ secrets.APP_RUNNER_SERVICE_ARN }}"
          APP_RUNNER_ECR_ACCESS_ROLE_ARN_VALUE="${{ secrets.APP_RUNNER_ECR_ACCESS_ROLE_ARN }}"
          APP_RUNNER_INSTANCE_ROLE_ARN_VALUE="${{ secrets.APP_RUNNER_INSTANCE_ROLE_ARN }}"

          if [ -z "$AWS_ACCOUNT_ID_VALUE" ]; then
            echo "AWS_ACCOUNT_ID secret is required" >&2
            exit 1
          fi

          echo "AWS_REGION=$AWS_REGION_VALUE" >> $GITHUB_ENV
          echo "AWS_ACCOUNT_ID=$AWS_ACCOUNT_ID_VALUE" >> $GITHUB_ENV
          echo "ECR_REPOSITORY=$ECR_REPOSITORY_VALUE" >> $GITHUB_ENV
          echo "IMAGE_TAG=$IMAGE_TAG_VALUE" >> $GITHUB_ENV
          echo "APP_RUNNER_SERVICE_NAME=$APP_RUNNER_SERVICE_NAME_VALUE" >> $GITHUB_ENV
          echo "APP_RUNNER_SERVICE_ARN=$APP_RUNNER_SERVICE_ARN_VALUE" >> $GITHUB_ENV
          echo "APP_RUNNER_ECR_ACCESS_ROLE_ARN=$APP_RUNNER_ECR_ACCESS_ROLE_ARN_VALUE" >> $GITHUB_ENV
          echo "APP_RUNNER_INSTANCE_ROLE_ARN=$APP_RUNNER_INSTANCE_ROLE_ARN_VALUE" >> $GITHUB_ENV

      - name: Build, tag, and push Docker image to ECR
        env:
          AWS_ACCOUNT_ID: ${{ env.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ env.AWS_REGION }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          # ensure ECR repository exists (creates if not)
          aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" \
            || aws ecr create-repository --repository-name "$ECR_REPOSITORY" \
                --image-tag-mutability IMMUTABLE \
                --region "$AWS_REGION" > /dev/null

          IMAGE_URI="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -f VectorSearch.Api/Dockerfile -t $IMAGE_URI .
          docker push $IMAGE_URI

      - name: Resolve App Runner service ARN
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          APP_RUNNER_SERVICE_NAME: ${{ env.APP_RUNNER_SERVICE_NAME }}
          APP_RUNNER_SERVICE_ARN: ${{ env.APP_RUNNER_SERVICE_ARN }}
        run: |
          SERVICE_ARN="$APP_RUNNER_SERVICE_ARN"

          if [ -z "$SERVICE_ARN" ]; then
            if ! SERVICE_ARN=$(aws apprunner list-services --region "$AWS_REGION" --query "ServiceSummaryList[?ServiceName=='$APP_RUNNER_SERVICE_NAME']|[0].ServiceArn" --output text); then
              echo "Unable to call apprunner:ListServices. Set APP_RUNNER_SERVICE_ARN secret or grant apprunner:ListServices and apprunner:CreateService." >&2
              exit 1
            fi
          fi

          if [ "$SERVICE_ARN" = "None" ]; then
            SERVICE_ARN=""
          fi

          echo "APP_RUNNER_SERVICE_ARN=$SERVICE_ARN" >> $GITHUB_ENV
          if [ -z "$SERVICE_ARN" ]; then
            echo "APP_RUNNER_EXISTS=false" >> $GITHUB_ENV
          else
            echo "APP_RUNNER_EXISTS=true" >> $GITHUB_ENV
          fi

      - name: Resolve App Runner instance role for existing service
        if: env.APP_RUNNER_EXISTS == 'true'
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          APP_RUNNER_SERVICE_ARN: ${{ env.APP_RUNNER_SERVICE_ARN }}
          APP_RUNNER_INSTANCE_ROLE_ARN: ${{ env.APP_RUNNER_INSTANCE_ROLE_ARN }}
        run: |
          ROLE_ARN="$APP_RUNNER_INSTANCE_ROLE_ARN"

          if [ -z "$ROLE_ARN" ]; then
            if ! ROLE_ARN=$(aws apprunner describe-service --region "$AWS_REGION" --service-arn "$APP_RUNNER_SERVICE_ARN" --query "Service.InstanceConfiguration.InstanceRoleArn" --output text); then
              echo "Unable to call apprunner:DescribeService. Set APP_RUNNER_INSTANCE_ROLE_ARN secret or grant apprunner:DescribeService." >&2
              exit 1
            fi
          fi

          if [ "$ROLE_ARN" = "None" ] || [ -z "$ROLE_ARN" ]; then
            echo "Existing App Runner service has no instance role. Set APP_RUNNER_INSTANCE_ROLE_ARN and update service instance configuration manually once." >&2
            exit 1
          fi

          echo "APP_RUNNER_INSTANCE_ROLE_ARN=$ROLE_ARN" >> $GITHUB_ENV

      - name: Create App Runner service if missing
        if: env.APP_RUNNER_EXISTS == 'false'
        env:
          AWS_ACCOUNT_ID: ${{ env.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ env.AWS_REGION }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          APP_RUNNER_SERVICE_NAME: ${{ env.APP_RUNNER_SERVICE_NAME }}
          APP_RUNNER_ECR_ACCESS_ROLE_ARN: ${{ env.APP_RUNNER_ECR_ACCESS_ROLE_ARN }}
          APP_RUNNER_INSTANCE_ROLE_ARN: ${{ env.APP_RUNNER_INSTANCE_ROLE_ARN }}
        run: |
          IMAGE_URI="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG"

          if [ -z "$APP_RUNNER_ECR_ACCESS_ROLE_ARN" ]; then
            echo "APP_RUNNER_ECR_ACCESS_ROLE_ARN secret is required to create a new App Runner service" >&2
            exit 1
          fi

          if [ -z "$APP_RUNNER_INSTANCE_ROLE_ARN" ]; then
            echo "APP_RUNNER_INSTANCE_ROLE_ARN secret is required to create a new App Runner service" >&2
            exit 1
          fi

          SERVICE_ARN=$(aws apprunner create-service \
            --region "$AWS_REGION" \
            --service-name "$APP_RUNNER_SERVICE_NAME" \
            --instance-configuration "InstanceRoleArn=$APP_RUNNER_INSTANCE_ROLE_ARN" \
            --source-configuration "AuthenticationConfiguration={AccessRoleArn=$APP_RUNNER_ECR_ACCESS_ROLE_ARN},ImageRepository={ImageIdentifier=$IMAGE_URI,ImageConfiguration={Port=8080},ImageRepositoryType=ECR}" \
            --query "Service.ServiceArn" \
            --output text)

          echo "APP_RUNNER_CREATED=true" >> $GITHUB_ENV
          echo "APP_RUNNER_SERVICE_ARN=$SERVICE_ARN" >> $GITHUB_ENV

      - name: Mark existing App Runner service
        if: env.APP_RUNNER_EXISTS == 'true'
        run: echo "APP_RUNNER_CREATED=false" >> $GITHUB_ENV

      - name: Update App Runner service
        if: env.APP_RUNNER_CREATED != 'true'
        env:
          AWS_ACCOUNT_ID: ${{ env.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ env.AWS_REGION }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          APP_RUNNER_SERVICE_ARN: ${{ env.APP_RUNNER_SERVICE_ARN }}
        run: |
          IMAGE_URI="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG"

          attempts=20
          delay_seconds=15

          for i in $(seq 1 $attempts); do
            set +e
            update_output=$(aws apprunner update-service \
              --service-arn "$APP_RUNNER_SERVICE_ARN" \
              --source-configuration "ImageRepository={ImageIdentifier=$IMAGE_URI,ImageConfiguration={Port=8080},ImageRepositoryType=ECR}" 2>&1)
            update_exit=$?
            set -e

            if [ $update_exit -eq 0 ]; then
              echo "$update_output"
              echo "App Runner update-service succeeded."
              exit 0
            fi

            if echo "$update_output" | grep -Eq "InvalidStateException|OPERATION_IN_PROGRESS"; then
              echo "App Runner is busy (attempt $i/$attempts). Retrying in $delay_seconds seconds..."
              sleep $delay_seconds
              continue
            fi

            echo "$update_output" >&2
            exit $update_exit
          done

          echo "Timed out waiting for App Runner service to become updatable after $attempts attempts." >&2
          exit 1
