
name: CI/CD

permissions:
  id-token: write
  contents: read

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  infrastructure:
    name: Deploy infrastructure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set AWS region
        run: |
          echo "AWS_REGION=${{ secrets.AWS_REGION || 'us-east-1' }}" >> $GITHUB_ENV

      - name: Validate AWS region
        run: |
          if [ -z "$AWS_REGION" ]; then
            echo "AWS_REGION is required but was not provided" >&2
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_INFRA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: '1.5.0'

      - name: Terraform apply
        working-directory: infra
        run: |
          terraform init -reconfigure
          terraform apply -auto-approve \
            -var="github_repo=${{ github.repository }}" \
            -var="github_branch=${{ github.ref }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}"

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: infrastructure

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        # restore all projects via solution to ensure test project packages are restored
        run: dotnet restore VectorSearch.Api/VectorSearch.Api.sln

      - name: Build entire solution
        run: dotnet build VectorSearch.Api/VectorSearch.Api.sln --configuration Release --no-restore

      - name: Run integration tests
        run: |
          # build will run automatically so we don't need --no-build
          dotnet test VectorSearch.IntegrationTests/VectorSearch.IntegrationTests.csproj \
            --configuration Release --verbosity normal

  deploy:
    name: Deploy to App Runner
    needs: build-and-test
    runs-on: ubuntu-latest
    # run only after the build-and-test job succeeds and on the primary branches
    if: needs.build-and-test.result == 'success' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set AWS region
        run: |
          echo "AWS_REGION=${{ secrets.AWS_REGION || 'us-east-1' }}" >> $GITHUB_ENV

      - name: Validate AWS region
        run: |
          if [ -z "$AWS_REGION" ]; then
            echo "AWS_REGION is required but was not provided" >&2
            exit 1
          fi
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_INFRA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
        env:
          AWS_REGION: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Resolve deploy variables
        run: |
          AWS_REGION_VALUE="${AWS_REGION:-us-east-1}"
          AWS_ACCOUNT_ID_VALUE="${{ secrets.AWS_ACCOUNT_ID }}"
          ECR_REPOSITORY_VALUE="${{ secrets.ECR_REPOSITORY || 'dotnet-vector-search' }}"

          if [ -z "$AWS_ACCOUNT_ID_VALUE" ]; then
            echo "AWS_ACCOUNT_ID secret is required" >&2
            exit 1
          fi

          echo "AWS_REGION=$AWS_REGION_VALUE" >> $GITHUB_ENV
          echo "AWS_ACCOUNT_ID=$AWS_ACCOUNT_ID_VALUE" >> $GITHUB_ENV
          echo "ECR_REPOSITORY=$ECR_REPOSITORY_VALUE" >> $GITHUB_ENV

      - name: Build, tag, and push Docker image to ECR
        env:
          AWS_ACCOUNT_ID: ${{ env.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ env.AWS_REGION }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
        run: |
          # ensure ECR repository exists (creates if not)
          aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" \
            || aws ecr create-repository --repository-name "$ECR_REPOSITORY" \
                --image-tag-mutability IMMUTABLE \
                --region "$AWS_REGION" > /dev/null

          IMAGE_URI="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:latest"
          docker build -t $IMAGE_URI ./VectorSearch.Api
          docker push $IMAGE_URI

      - name: Update App Runner service
        env:
          AWS_ACCOUNT_ID: ${{ env.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ env.AWS_REGION }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
          APP_RUNNER_SERVICE_ARN: ${{ secrets.APP_RUNNER_SERVICE_ARN }}
        run: |
          if [ -z "$APP_RUNNER_SERVICE_ARN" ]; then
            echo "APP_RUNNER_SERVICE_ARN secret is required" >&2
            exit 1
          fi

          IMAGE_URI="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:latest"
          aws apprunner update-service \
            --service-arn "$APP_RUNNER_SERVICE_ARN" \
            --source-configuration ImageRepository={ImageIdentifier="$IMAGE_URI",ImageConfiguration={Port="8080"},ImageRepositoryType="ECR"}
