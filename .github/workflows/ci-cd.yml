
name: CI/CD

permissions:
  id-token: write
  contents: read

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  AWS_REGION_DEFAULT: us-east-1
  ECR_REPO_DEFAULT: dotnet-rag-agent
  ECS_CLUSTER_DEFAULT: dotnet-rag-agent
  ECS_SERVICE_DEFAULT: dotnet-rag-agent

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Build & test
        run: |
          dotnet build VectorSearch.Api.sln --configuration Release
          dotnet format VectorSearch.Api.sln --verify-no-changes --severity warn
          dotnet test VectorSearch.IntegrationTests/VectorSearch.IntegrationTests.csproj \
            --configuration Release --no-build --verbosity normal

  infrastructure:
    name: Deploy infrastructure
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_INFRA_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || env.AWS_REGION_DEFAULT }}

      - name: Prepare
        working-directory: infra
        run: |
          bash ./bootstrap-deploy-role.sh
          REGION="${AWS_REGION:-${{ env.AWS_REGION_DEFAULT }}}"
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "REGION=$REGION" >> $GITHUB_ENV
          echo "ACCOUNT_ID=$ACCOUNT_ID" >> $GITHUB_ENV

      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: '1.5.0'
          terraform_wrapper: false

      - name: Provision infrastructure
        run: |
          export TF_VAR_github_repo="${{ github.repository }}"
          export TF_VAR_github_branch="${{ github.ref }}"
          export TF_VAR_aws_region="$REGION"

          terraform -chdir=infra init -reconfigure

          # Read resource names from state; fall back to defaults on first run
          safe_output() {
            local val
            val=$(terraform -chdir=infra output -raw "$1" 2>/dev/null || true)
            if [ -z "$val" ] || [ "${#val}" -gt 63 ]; then echo "$2"; else echo "$val"; fi
          }

          VECTOR_BUCKET_NAME=$(safe_output vector_bucket_name posts-semantic-search)
          VECTOR_INDEX_NAME=$(safe_output vector_index_name posts-content-index)
          ECR_REPOSITORY_NAME=$(safe_output ecr_repository_name "${{ env.ECR_REPO_DEFAULT }}")
          ECS_CLUSTER_NAME=$(safe_output ecs_cluster_name "${{ env.ECS_CLUSTER_DEFAULT }}")
          ECS_SERVICE_NAME=$(safe_output ecs_service_name "${{ env.ECS_SERVICE_DEFAULT }}")

          BUCKET_ADDRESS="module.s3_vectors.aws_s3vectors_vector_bucket.vector_bucket"
          INDEX_ADDRESS="module.s3_vectors.aws_s3vectors_index.vector_index"
          ECR_ADDRESS="aws_ecr_repository.api"
          ECS_CLUSTER_ADDRESS="aws_ecs_cluster.api"
          ECS_SERVICE_ADDRESS="aws_ecs_service.api"
          SG_ALB_ADDRESS="aws_security_group.alb"
          SG_TASKS_ADDRESS="aws_security_group.ecs_tasks"
          ALB_ADDRESS="aws_lb.api"
          TG_ADDRESS="aws_lb_target_group.api"
          IAM_EXEC_ADDRESS="aws_iam_role.ecs_task_execution"
          IAM_TASK_ADDRESS="aws_iam_role.ecs_task"
          CW_LOG_ADDRESS="aws_cloudwatch_log_group.api"

          tf_import() { terraform -chdir=infra import "$@"; }
          tf_has()    { terraform -chdir=infra state show "$1" >/dev/null 2>&1; }

          VECTOR_BUCKET_EXISTS="false"
          if ! tf_has "$BUCKET_ADDRESS"; then
            BUCKET_FOUND=$(aws s3vectors list-vector-buckets \
              --region "$REGION" \
              --query "vectorBuckets[?vectorBucketName=='$VECTOR_BUCKET_NAME'].vectorBucketName | [0]" \
              --output text 2>/dev/null || true)
            if [ "$BUCKET_FOUND" != "None" ] && [ -n "$BUCKET_FOUND" ]; then
              VECTOR_BUCKET_EXISTS="true"
              tf_import "$BUCKET_ADDRESS" "arn:aws:s3vectors:$REGION:$ACCOUNT_ID:bucket/$VECTOR_BUCKET_NAME"
            fi
          else
            VECTOR_BUCKET_EXISTS="true"
          fi

          if ! tf_has "$INDEX_ADDRESS" && [ "$VECTOR_BUCKET_EXISTS" = "true" ]; then
            INDEX_FOUND=$(aws s3vectors list-indexes \
              --region "$REGION" \
              --vector-bucket-name "$VECTOR_BUCKET_NAME" \
              --query "indexes[?indexName=='$VECTOR_INDEX_NAME'].indexName | [0]" \
              --output text 2>/dev/null || true)
            if [ "$INDEX_FOUND" != "None" ] && [ -n "$INDEX_FOUND" ]; then
              tf_import "$INDEX_ADDRESS" "arn:aws:s3vectors:$REGION:$ACCOUNT_ID:bucket/$VECTOR_BUCKET_NAME/index/$VECTOR_INDEX_NAME"
            fi
          fi

          if ! tf_has "$ECR_ADDRESS"; then
            if aws ecr describe-repositories --region "$REGION" --repository-names "$ECR_REPOSITORY_NAME" >/dev/null 2>&1; then
              tf_import "$ECR_ADDRESS" "$ECR_REPOSITORY_NAME"
            fi
          fi

          if ! tf_has "$ECS_CLUSTER_ADDRESS"; then
            CLUSTER_ARN=$(aws ecs describe-clusters \
              --region "$REGION" \
              --clusters "$ECS_CLUSTER_NAME" \
              --query "clusters[?status=='ACTIVE'].clusterArn | [0]" \
              --output text 2>/dev/null || true)
            if [ "$CLUSTER_ARN" != "None" ] && [ -n "$CLUSTER_ARN" ]; then
              tf_import "$ECS_CLUSTER_ADDRESS" "$ECS_CLUSTER_NAME"
            fi
          fi

          if ! tf_has "$ECS_SERVICE_ADDRESS"; then
            SERVICE_ARN=$(aws ecs describe-services \
              --region "$REGION" \
              --cluster "$ECS_CLUSTER_NAME" \
              --services "$ECS_SERVICE_NAME" \
              --query "services[?status=='ACTIVE'].serviceArn | [0]" \
              --output text 2>/dev/null || true)
            if [ "$SERVICE_ARN" != "None" ] && [ -n "$SERVICE_ARN" ]; then
              tf_import "$ECS_SERVICE_ADDRESS" "$ECS_CLUSTER_NAME/$ECS_SERVICE_NAME"
            fi
          fi

          VPC_ID=$(aws ec2 describe-vpcs --region "$REGION" \
            --filters "Name=isDefault,Values=true" \
            --query "Vpcs[0].VpcId" --output text 2>/dev/null || true)

          if ! tf_has "$SG_ALB_ADDRESS"; then
            SG_ALB_ID=$(aws ec2 describe-security-groups --region "$REGION" \
              --filters "Name=group-name,Values=${ECS_SERVICE_NAME}-alb" "Name=vpc-id,Values=$VPC_ID" \
              --query "SecurityGroups[0].GroupId" --output text 2>/dev/null || true)
            if [ "$SG_ALB_ID" != "None" ] && [ -n "$SG_ALB_ID" ]; then
              tf_import "$SG_ALB_ADDRESS" "$SG_ALB_ID"
            fi
          fi

          if ! tf_has "$SG_TASKS_ADDRESS"; then
            SG_TASKS_ID=$(aws ec2 describe-security-groups --region "$REGION" \
              --filters "Name=group-name,Values=${ECS_SERVICE_NAME}-tasks" "Name=vpc-id,Values=$VPC_ID" \
              --query "SecurityGroups[0].GroupId" --output text 2>/dev/null || true)
            if [ "$SG_TASKS_ID" != "None" ] && [ -n "$SG_TASKS_ID" ]; then
              tf_import "$SG_TASKS_ADDRESS" "$SG_TASKS_ID"
            fi
          fi

          if ! tf_has "$TG_ADDRESS"; then
            TG_ARN=$(aws elbv2 describe-target-groups --region "$REGION" \
              --names "$ECS_SERVICE_NAME" \
              --query "TargetGroups[0].TargetGroupArn" --output text 2>/dev/null || true)
            if [ "$TG_ARN" != "None" ] && [ -n "$TG_ARN" ]; then
              tf_import "$TG_ADDRESS" "$TG_ARN"
            fi
          fi

          if ! tf_has "$ALB_ADDRESS"; then
            ALB_ARN=$(aws elbv2 describe-load-balancers --region "$REGION" \
              --names "$ECS_SERVICE_NAME" \
              --query "LoadBalancers[0].LoadBalancerArn" --output text 2>/dev/null || true)
            if [ "$ALB_ARN" != "None" ] && [ -n "$ALB_ARN" ]; then
              tf_import "$ALB_ADDRESS" "$ALB_ARN"
            fi
          fi

          if ! tf_has "$IAM_EXEC_ADDRESS"; then
            if aws iam get-role --role-name EcsTaskExecutionRole >/dev/null 2>&1; then
              tf_import "$IAM_EXEC_ADDRESS" "EcsTaskExecutionRole"
            fi
          fi

          if ! tf_has "$IAM_TASK_ADDRESS"; then
            if aws iam get-role --role-name EcsTaskRole >/dev/null 2>&1; then
              tf_import "$IAM_TASK_ADDRESS" "EcsTaskRole"
            fi
          fi

          if ! tf_has "$CW_LOG_ADDRESS"; then
            LOG_GROUP=$(aws logs describe-log-groups --region "$REGION" \
              --log-group-name-prefix "/ecs/$ECS_SERVICE_NAME" \
              --query "logGroups[?logGroupName=='/ecs/$ECS_SERVICE_NAME'].logGroupName | [0]" \
              --output text 2>/dev/null || true)
            if [ "$LOG_GROUP" != "None" ] && [ -n "$LOG_GROUP" ]; then
              tf_import "$CW_LOG_ADDRESS" "/ecs/$ECS_SERVICE_NAME"
            fi
          fi

          # Ensure ECR repository exists before pushing any image
          terraform -chdir=infra apply -auto-approve \
            -target=aws_ecr_repository.api \
            -var="github_repo=${{ github.repository }}" \
            -var="github_branch=${{ github.ref }}" \
            -var="aws_region=$REGION"

          # Push a bootstrap image if the repository is empty (ECS requires an image to start)
          ECR_REPO="${{ secrets.ECR_REPOSITORY || env.ECR_REPO_DEFAULT }}"
          ECR_URI="$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/$ECR_REPO"
          IMAGE_COUNT=$(aws ecr list-images --repository-name "$ECR_REPO" --region "$REGION" \
            --query 'length(imageIds)' --output text 2>/dev/null || echo "0")
          if [ "$IMAGE_COUNT" = "0" ] || [ "$IMAGE_COUNT" = "None" ]; then
            echo "ECR is empty — building and pushing bootstrap image..."
            aws ecr get-login-password --region "$REGION" | docker login --username AWS --password-stdin "$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com"
            docker build -f VectorSearch.Api/Dockerfile -t "$ECR_URI:latest" .
            docker push "$ECR_URI:latest"
          else
            echo "ECR already has $IMAGE_COUNT image(s) — skipping bootstrap."
          fi

          # Full infrastructure apply now that a valid image exists in ECR
          terraform -chdir=infra apply -auto-approve \
            -var="github_repo=${{ github.repository }}" \
            -var="github_branch=${{ github.ref }}" \
            -var="aws_region=$REGION"

          # Verify S3 Vectors resources
          VECTOR_BUCKET_NAME=$(terraform -chdir=infra output -raw vector_bucket_name)
          VECTOR_INDEX_NAME=$(terraform -chdir=infra output -raw vector_index_name)
          BUCKET_FOUND=$(aws s3vectors list-vector-buckets \
            --region "$REGION" \
            --query "vectorBuckets[?vectorBucketName=='$VECTOR_BUCKET_NAME'].vectorBucketName | [0]" \
            --output text)
          if [ "$BUCKET_FOUND" = "None" ] || [ -z "$BUCKET_FOUND" ]; then
            echo "S3 Vectors bucket '$VECTOR_BUCKET_NAME' not found in '$REGION'." >&2; exit 1
          fi
          INDEX_FOUND=$(aws s3vectors list-indexes \
            --region "$REGION" \
            --vector-bucket-name "$VECTOR_BUCKET_NAME" \
            --query "indexes[?indexName=='$VECTOR_INDEX_NAME'].indexName | [0]" \
            --output text)
          if [ "$INDEX_FOUND" = "None" ] || [ -z "$INDEX_FOUND" ]; then
            echo "S3 Vectors index '$VECTOR_INDEX_NAME' not found in '$VECTOR_BUCKET_NAME'." >&2; exit 1
          fi
          echo "S3 Vectors verification succeeded."

  deploy:
    name: Deploy to ECS
    needs: [build-and-test, infrastructure]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && needs.build-and-test.result == 'success' && needs.infrastructure.result == 'success'

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_INFRA_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || env.AWS_REGION_DEFAULT }}

      - uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push Docker image
        run: |
          REGION="${AWS_REGION:-${{ env.AWS_REGION_DEFAULT }}}"
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_REPO="${{ secrets.ECR_REPOSITORY || env.ECR_REPO_DEFAULT }}"
          IMAGE_TAG="${GITHUB_SHA::12}-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}"
          IMAGE_URI="$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/$ECR_REPO:$IMAGE_TAG"
          echo "REGION=$REGION" >> $GITHUB_ENV
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV
          echo "ECS_CLUSTER_NAME=${{ secrets.ECS_CLUSTER_NAME || env.ECS_CLUSTER_DEFAULT }}" >> $GITHUB_ENV
          echo "ECS_SERVICE_NAME=${{ secrets.ECS_SERVICE_NAME || env.ECS_SERVICE_DEFAULT }}" >> $GITHUB_ENV
          docker build -f VectorSearch.Api/Dockerfile -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"

      - name: Deploy to ECS
        run: |
          CURRENT_TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "$ECS_SERVICE_NAME" \
            --region "$REGION" \
            --query 'taskDefinition' \
            --output json)

          NEW_TASK_DEF=$(echo "$CURRENT_TASK_DEF" | jq \
            --arg IMAGE "$IMAGE_URI" \
            '.containerDefinitions[0].image = $IMAGE |
             del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                 .placementConstraints, .compatibilities, .registeredAt, .registeredBy)')

          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --region "$REGION" \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "New task definition: $NEW_TASK_DEF_ARN"

          # Rolling deployment: ECS starts the new task, waits for it to be healthy,
          # then stops the old task. No downtime.
          aws ecs update-service \
            --cluster "$ECS_CLUSTER_NAME" \
            --service "$ECS_SERVICE_NAME" \
            --task-definition "$NEW_TASK_DEF_ARN" \
            --region "$REGION"

          echo "Waiting for rolling deployment to stabilise..."
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER_NAME" \
            --services "$ECS_SERVICE_NAME" \
            --region "$REGION"

          echo "Deployment complete."
