
name: CI/CD

permissions:
  id-token: write
  contents: read

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  AWS_REGION_DEFAULT: us-east-1
  ECR_REPO_DEFAULT: dotnet-rag-agent
  ECS_CLUSTER_DEFAULT: dotnet-rag-agent
  ECS_SERVICE_DEFAULT: dotnet-rag-agent

jobs:
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      deploy: ${{ steps.check.outputs.deploy }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for non-Markdown changes
        id: check
        run: |
          if git diff --name-only HEAD^ HEAD | grep -qvE '\.md$'; then
            echo "deploy=true" >> $GITHUB_OUTPUT
          else
            echo "deploy=false" >> $GITHUB_OUTPUT
            echo "Only Markdown files changed — skipping infrastructure and deploy."
          fi

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build & test
        run: |
          dotnet build RagAgent.sln --configuration Release
          dotnet format RagAgent.sln --verify-no-changes --severity warn
          dotnet test RagAgent.UnitTests/RagAgent.UnitTests.csproj \
            --configuration Release --no-build --verbosity normal \
            --collect:"XPlat Code Coverage" --results-directory coverage
          dotnet test RagAgent.IntegrationTests/RagAgent.IntegrationTests.csproj \
            --configuration Release --no-build --verbosity normal

      - name: Report coverage
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool
          reportgenerator \
            -reports:"coverage/**/coverage.cobertura.xml" \
            -targetdir:"coverage/report" \
            -reporttypes:"TextSummary" \
            -assemblyfilters:"+RagAgent.Api;+RagAgent.Core;+RagAgent.Agents"
          cat coverage/report/Summary.txt

  infrastructure:
    name: Deploy infrastructure
    runs-on: ubuntu-latest
    needs: [build-and-test, detect-changes]
    if: github.event_name == 'push' && needs.detect-changes.outputs.deploy == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_INFRA_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || env.AWS_REGION_DEFAULT }}

      - name: Prepare
        working-directory: infra
        run: |
          bash ./bootstrap-deploy-role.sh
          REGION="${AWS_REGION:-${{ env.AWS_REGION_DEFAULT }}}"
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "REGION=$REGION" >> $GITHUB_ENV
          echo "ACCOUNT_ID=$ACCOUNT_ID" >> $GITHUB_ENV

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.5.0'
          terraform_wrapper: false

      - name: Provision infrastructure
        run: |
          export TF_VAR_github_repo="${{ github.repository }}"
          export TF_VAR_github_branch="${{ github.ref }}"
          export TF_VAR_aws_region="$REGION"

          terraform -chdir=infra init -reconfigure

          # Ensure ECR repository exists before pushing any image
          terraform -chdir=infra apply -auto-approve -target=aws_ecr_repository.api

          # Push a bootstrap image if the repository is empty (ECS requires an image to start)
          ECR_REPO="${{ secrets.ECR_REPOSITORY || env.ECR_REPO_DEFAULT }}"
          bash scripts/bootstrap-ecr-image.sh "$REGION" "$ACCOUNT_ID" "$ECR_REPO"

          # Full infrastructure apply now that a valid image exists in ECR
          terraform -chdir=infra apply -auto-approve

          # Verify S3 Vectors resources
          VECTOR_BUCKET_NAME=$(terraform -chdir=infra output -raw vector_bucket_name)
          VECTOR_INDEX_NAME=$(terraform -chdir=infra output -raw vector_index_name)
          bash scripts/verify-s3-vectors.sh "$REGION" "$VECTOR_BUCKET_NAME" "$VECTOR_INDEX_NAME"

  deploy:
    name: Deploy to ECS
    needs: [build-and-test, infrastructure, detect-changes]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && needs.detect-changes.outputs.deploy == 'true' && needs.build-and-test.result == 'success' && needs.infrastructure.result == 'success'

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_INFRA_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || env.AWS_REGION_DEFAULT }}

      - uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: 'true'

      - name: Build and push Docker image
        run: |
          REGION="${AWS_REGION:-${{ env.AWS_REGION_DEFAULT }}}"
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_REPO="${{ secrets.ECR_REPOSITORY || env.ECR_REPO_DEFAULT }}"
          IMAGE_TAG="${GITHUB_SHA::12}-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}"
          IMAGE_URI="$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/$ECR_REPO:$IMAGE_TAG"
          echo "REGION=$REGION" >> $GITHUB_ENV
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV
          echo "ECS_CLUSTER_NAME=${{ secrets.ECS_CLUSTER_NAME || env.ECS_CLUSTER_DEFAULT }}" >> $GITHUB_ENV
          echo "ECS_SERVICE_NAME=${{ secrets.ECS_SERVICE_NAME || env.ECS_SERVICE_DEFAULT }}" >> $GITHUB_ENV
          docker build -f RagAgent.Api/Dockerfile -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"

      - name: Deploy to ECS
        run: bash scripts/deploy-ecs.sh "$REGION" "$ECS_CLUSTER_NAME" "$ECS_SERVICE_NAME" "$IMAGE_URI"
