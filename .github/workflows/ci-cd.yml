name: CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  infrastructure:
    name: Deploy infrastructure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set AWS region
        run: |
          echo "AWS_REGION=${{ secrets.AWS_REGION || 'us-east-1' }}" >> $GITHUB_ENV

      - name: Validate AWS region
        run: |
          if [ -z "$AWS_REGION" ]; then
            echo "AWS_REGION is required but was not provided" >&2
            exit 1
          fi

      - name: Dump role ARN
        run: |
          secret="${{ secrets.AWS_INFRA_ROLE_ARN }}"
          echo "role length = ${#secret}"
          echo "role prefix = ${secret:0:10}"
          echo "role suffix = ${secret: -10}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        continue-on-error: true
        with:
          role-to-assume: ${{ secrets.AWS_INFRA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
        env:
          AWS_REGION: ${{ env.AWS_REGION }}

        - name: Log environment and OIDC info
          run: |
            echo "GITHUB_REF: $GITHUB_REF"
            echo "GITHUB_REPOSITORY: $GITHUB_REPOSITORY"
            echo "GITHUB_ACTOR: $GITHUB_ACTOR"
            echo "AWS_REGION: $AWS_REGION"
            echo "AWS_INFRA_ROLE_ARN: ${{ secrets.AWS_INFRA_ROLE_ARN }}"
            echo "Listing OIDC token claims (if available):"
            if [ -n "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" ]; then
              echo "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" | base64 -d | jq . || echo "jq not available"
            else
              echo "No OIDC token found."
            fi

        - name: Verify assumed identity with debug
          run: |
            echo "calling sts get-caller-identity with debug output"
            aws sts get-caller-identity --debug || true

      - name: Verify assumed identity
        run: |
          echo "calling sts get-caller-identity"
          aws sts get-caller-identity || true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: '1.5.0'

      - name: Terraform init
        working-directory: infra
        run: terraform init

      - name: Terraform apply
        working-directory: infra
        run: |
          terraform apply -auto-approve \
            -var="github_repo=${{ github.repository }}" \
            -var="github_branch=${{ github.ref }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}"

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: infrastructure

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        # restore all projects via solution to ensure test project packages are restored
        run: dotnet restore VectorSearch.Api/VectorSearch.Api.sln

      - name: Build entire solution
        run: dotnet build VectorSearch.Api/VectorSearch.Api.sln --configuration Release --no-restore

      - name: Run integration tests
        run: |
          # build will run automatically so we don't need --no-build
          dotnet test VectorSearch.IntegrationTests/VectorSearch.IntegrationTests.csproj \
            --configuration Release --verbosity normal

  deploy:
    name: Deploy to App Runner
    needs: build-and-test
    runs-on: ubuntu-latest
    # run only after the build-and-test job succeeds and on the primary branches
    if: needs.build-and-test.result == 'success' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set AWS region
        run: |
          echo "AWS_REGION=${{ secrets.AWS_REGION || 'us-east-1' }}" >> $GITHUB_ENV

      - name: Validate AWS region
        run: |
          if [ -z "$AWS_REGION" ]; then
            echo "AWS_REGION is required but was not provided" >&2
            exit 1
          fi
      - name: Dump role ARN
        run: |
          secret="${{ secrets.AWS_INFRA_ROLE_ARN }}"
          echo "role length = ${#secret}"
          echo "role prefix = ${secret:0:10}"
          echo "role suffix = ${secret: -10}"
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        continue-on-error: true
        with:
          role-to-assume: ${{ secrets.AWS_INFRA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
        env:
          AWS_REGION: ${{ env.AWS_REGION }}

      - name: Verify assumed identity
        run: |
          echo "calling sts get-caller-identity"
          aws sts get-caller-identity || true

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push Docker image to ECR
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        run: |
          # ensure ECR repository exists (creates if not)
          aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" \
            || aws ecr create-repository --repository-name "$ECR_REPOSITORY" \
                --image-tag-mutability IMMUTABLE \
                --region "$AWS_REGION" > /dev/null

          IMAGE_URI="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:latest"
          docker build -t $IMAGE_URI ./VectorSearch.Api
          docker push $IMAGE_URI

      - name: Update App Runner service
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          APP_RUNNER_SERVICE_ARN: ${{ secrets.APP_RUNNER_SERVICE_ARN }}
        run: |
          IMAGE_URI="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:latest"
          aws apprunner update-service \
            --service-arn "$APP_RUNNER_SERVICE_ARN" \
            --source-configuration ImageRepository={ImageIdentifier="$IMAGE_URI",ImageConfiguration={Port="8080"},ImageRepositoryType="ECR"}
