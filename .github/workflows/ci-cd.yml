
name: CI/CD

permissions:
  id-token: write
  contents: read

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  AWS_REGION_DEFAULT: us-east-1
  ECR_REPO_DEFAULT: dotnet-vector-search
  APP_RUNNER_DEFAULT: dotnet-vector-search

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Build & test
        run: |
          dotnet build VectorSearch.Api.sln --configuration Release
          dotnet test VectorSearch.IntegrationTests/VectorSearch.IntegrationTests.csproj \
            --configuration Release --no-build --verbosity normal

  infrastructure:
    name: Deploy infrastructure
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_INFRA_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || env.AWS_REGION_DEFAULT }}

      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: '1.5.0'
          terraform_wrapper: false

      - name: Set shared variables
        run: |
          REGION="${AWS_REGION:-${{ env.AWS_REGION_DEFAULT }}}"
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "REGION=$REGION" >> $GITHUB_ENV
          echo "ACCOUNT_ID=$ACCOUNT_ID" >> $GITHUB_ENV

      - name: Import existing resources into state (best effort)
        working-directory: infra
        run: |
          export TF_VAR_github_repo="${{ github.repository }}"
          export TF_VAR_github_branch="${{ github.ref }}"
          export TF_VAR_aws_region="$REGION"

          terraform init -reconfigure

          # Read resource names from state; fall back to defaults on first run
          safe_output() {
            local val
            val=$(terraform output -raw "$1" 2>/dev/null || true)
            if [ -z "$val" ] || [ "${#val}" -gt 63 ]; then echo "$2"; else echo "$val"; fi
          }

          VECTOR_BUCKET_NAME=$(safe_output vector_bucket_name posts-semantic-search)
          VECTOR_INDEX_NAME=$(safe_output vector_index_name posts-content-index)
          ECR_REPOSITORY_NAME=$(safe_output ecr_repository_name "${{ env.ECR_REPO_DEFAULT }}")
          APP_RUNNER_SERVICE_NAME="${{ secrets.APP_RUNNER_SERVICE_NAME || env.APP_RUNNER_DEFAULT }}"

          BUCKET_ADDRESS="module.s3_vectors.aws_s3vectors_vector_bucket.vector_bucket"
          INDEX_ADDRESS="module.s3_vectors.aws_s3vectors_index.vector_index"
          ECR_ADDRESS="aws_ecr_repository.api"
          APP_RUNNER_ADDRESS="aws_apprunner_service.api"

          VECTOR_BUCKET_EXISTS="false"
          if ! terraform state show "$BUCKET_ADDRESS" >/dev/null 2>&1; then
            BUCKET_FOUND=$(aws s3vectors list-vector-buckets \
              --region "$REGION" \
              --query "vectorBuckets[?vectorBucketName=='$VECTOR_BUCKET_NAME'].vectorBucketName | [0]" \
              --output text 2>/dev/null || true)
            if [ "$BUCKET_FOUND" != "None" ] && [ -n "$BUCKET_FOUND" ]; then
              VECTOR_BUCKET_EXISTS="true"
              terraform import "$BUCKET_ADDRESS" "arn:aws:s3vectors:$REGION:$ACCOUNT_ID:bucket/$VECTOR_BUCKET_NAME"
            fi
          else
            VECTOR_BUCKET_EXISTS="true"
          fi

          if ! terraform state show "$INDEX_ADDRESS" >/dev/null 2>&1; then
            if [ "$VECTOR_BUCKET_EXISTS" = "true" ]; then
              INDEX_FOUND=$(aws s3vectors list-indexes \
                --region "$REGION" \
                --vector-bucket-name "$VECTOR_BUCKET_NAME" \
                --query "indexes[?indexName=='$VECTOR_INDEX_NAME'].indexName | [0]" \
                --output text 2>/dev/null || true)
              if [ "$INDEX_FOUND" != "None" ] && [ -n "$INDEX_FOUND" ]; then
                terraform import "$INDEX_ADDRESS" "arn:aws:s3vectors:$REGION:$ACCOUNT_ID:bucket/$VECTOR_BUCKET_NAME/index/$VECTOR_INDEX_NAME"
              fi
            fi
          fi

          if ! terraform state show "$ECR_ADDRESS" >/dev/null 2>&1; then
            if aws ecr describe-repositories --region "$REGION" --repository-names "$ECR_REPOSITORY_NAME" >/dev/null 2>&1; then
              terraform import "$ECR_ADDRESS" "$ECR_REPOSITORY_NAME"
            fi
          fi

          if ! terraform state show "$APP_RUNNER_ADDRESS" >/dev/null 2>&1; then
            APP_RUNNER_ARN=$(aws apprunner list-services \
              --region "$REGION" \
              --query "ServiceSummaryList[?ServiceName=='$APP_RUNNER_SERVICE_NAME'].ServiceArn | [0]" \
              --output text 2>/dev/null || true)
            if [ "$APP_RUNNER_ARN" != "None" ] && [ -n "$APP_RUNNER_ARN" ]; then
              terraform import "$APP_RUNNER_ADDRESS" "$APP_RUNNER_ARN"
            fi
          fi

      - name: Push bootstrap image to ECR if empty
        run: |
          ECR_REPO="${{ secrets.ECR_REPOSITORY || env.ECR_REPO_DEFAULT }}"
          ECR_URI="$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/$ECR_REPO"

          aws ecr describe-repositories --repository-names "$ECR_REPO" --region "$REGION" >/dev/null 2>&1 \
            || aws ecr create-repository --repository-name "$ECR_REPO" --image-tag-mutability IMMUTABLE --region "$REGION" >/dev/null

          IMAGE_COUNT=$(aws ecr list-images --repository-name "$ECR_REPO" --region "$REGION" \
            --query 'length(imageIds)' --output text 2>/dev/null || echo "0")

          if [ "$IMAGE_COUNT" = "0" ] || [ "$IMAGE_COUNT" = "None" ]; then
            echo "ECR is empty — building and pushing bootstrap image..."
            aws ecr get-login-password --region "$REGION" | docker login --username AWS --password-stdin "$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com"
            docker build -f VectorSearch.Api/Dockerfile -t "$ECR_URI:latest" .
            docker push "$ECR_URI:latest"
          else
            echo "ECR already has $IMAGE_COUNT image(s) — skipping bootstrap."
          fi

      - name: Import ECR repo created by bootstrap into state
        working-directory: infra
        run: |
          ECR_REPO="${{ secrets.ECR_REPOSITORY || env.ECR_REPO_DEFAULT }}"
          if ! terraform state show "aws_ecr_repository.api" >/dev/null 2>&1; then
            if aws ecr describe-repositories --region "$REGION" --repository-names "$ECR_REPO" >/dev/null 2>&1; then
              terraform import "aws_ecr_repository.api" "$ECR_REPO"
            fi
          fi

      - name: Terraform apply
        working-directory: infra
        run: |
          terraform apply -auto-approve \
            -var="github_repo=${{ github.repository }}" \
            -var="github_branch=${{ github.ref }}" \
            -var="aws_region=$REGION"

      - name: Verify S3 Vectors resources
        working-directory: infra
        run: |
          VECTOR_BUCKET_NAME=$(terraform output -raw vector_bucket_name)
          VECTOR_INDEX_NAME=$(terraform output -raw vector_index_name)

          BUCKET_FOUND=$(aws s3vectors list-vector-buckets \
            --region "$REGION" \
            --query "vectorBuckets[?vectorBucketName=='$VECTOR_BUCKET_NAME'].vectorBucketName | [0]" \
            --output text)
          if [ "$BUCKET_FOUND" = "None" ] || [ -z "$BUCKET_FOUND" ]; then
            echo "S3 Vectors bucket '$VECTOR_BUCKET_NAME' not found in '$REGION'." >&2
            exit 1
          fi

          INDEX_FOUND=$(aws s3vectors list-indexes \
            --region "$REGION" \
            --vector-bucket-name "$VECTOR_BUCKET_NAME" \
            --query "indexes[?indexName=='$VECTOR_INDEX_NAME'].indexName | [0]" \
            --output text)
          if [ "$INDEX_FOUND" = "None" ] || [ -z "$INDEX_FOUND" ]; then
            echo "S3 Vectors index '$VECTOR_INDEX_NAME' not found in '$VECTOR_BUCKET_NAME'." >&2
            exit 1
          fi

          echo "S3 Vectors verification succeeded."

  deploy:
    name: Deploy to App Runner
    needs: [build-and-test, infrastructure]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && needs.build-and-test.result == 'success' && needs.infrastructure.result == 'success'

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_INFRA_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || env.AWS_REGION_DEFAULT }}

      - uses: aws-actions/amazon-ecr-login@v1

      - name: Set deploy variables
        run: |
          REGION="${AWS_REGION:-${{ env.AWS_REGION_DEFAULT }}}"
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_REPO="${{ secrets.ECR_REPOSITORY || env.ECR_REPO_DEFAULT }}"
          IMAGE_TAG="${GITHUB_SHA::12}-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}"
          APP_RUNNER_SERVICE_NAME="${{ secrets.APP_RUNNER_SERVICE_NAME || env.APP_RUNNER_DEFAULT }}"

          echo "REGION=$REGION" >> $GITHUB_ENV
          echo "ACCOUNT_ID=$ACCOUNT_ID" >> $GITHUB_ENV
          echo "ECR_REPO=$ECR_REPO" >> $GITHUB_ENV
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "IMAGE_URI=$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/$ECR_REPO:$IMAGE_TAG" >> $GITHUB_ENV
          echo "APP_RUNNER_SERVICE_NAME=$APP_RUNNER_SERVICE_NAME" >> $GITHUB_ENV

      - name: Build and push Docker image
        run: |
          docker build -f VectorSearch.Api/Dockerfile -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"

      - name: Update App Runner service
        run: |
          # Resolve service ARN (Terraform created the service in infra job)
          SERVICE_ARN="${{ secrets.APP_RUNNER_SERVICE_ARN }}"
          if [ -z "$SERVICE_ARN" ]; then
            SERVICE_ARN=$(aws apprunner list-services --region "$REGION" \
              --query "ServiceSummaryList[?ServiceName=='$APP_RUNNER_SERVICE_NAME']|[0].ServiceArn" \
              --output text)
          fi
          if [ -z "$SERVICE_ARN" ] || [ "$SERVICE_ARN" = "None" ]; then
            echo "App Runner service '$APP_RUNNER_SERVICE_NAME' not found." >&2
            exit 1
          fi

          # Retry loop for services still settling after infra job
          for i in $(seq 1 20); do
            set +e
            output=$(aws apprunner update-service \
              --service-arn "$SERVICE_ARN" \
              --source-configuration "ImageRepository={ImageIdentifier=$IMAGE_URI,ImageConfiguration={Port=8080},ImageRepositoryType=ECR}" 2>&1)
            rc=$?
            set -e

            if [ $rc -eq 0 ]; then
              echo "$output"
              echo "App Runner update-service succeeded."
              exit 0
            fi

            if echo "$output" | grep -Eq "InvalidStateException|OPERATION_IN_PROGRESS"; then
              echo "App Runner is busy (attempt $i/20). Retrying in 15s..."
              sleep 15
              continue
            fi

            echo "$output" >&2
            exit $rc
          done

          echo "Timed out waiting for App Runner to become updatable." >&2
          exit 1
