name: Destroy Infrastructure

permissions:
  id-token: write
  contents: read

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DESTROY to continue"
        required: true
        type: string
      aws_region:
        description: "AWS region"
        required: false
        default: "us-east-1"
        type: string
      vector_bucket_name:
        description: "S3 Vectors bucket name"
        required: false
        default: "posts-semantic-search"
        type: string
      vector_index_name:
        description: "S3 Vectors index name"
        required: false
        default: "posts-content-index"
        type: string
      ecr_repository_name:
        description: "ECR repository name"
        required: false
        default: "dotnet-rag-agent"
        type: string
      ecs_cluster_name:
        description: "ECS cluster name"
        required: false
        default: "dotnet-rag-agent"
        type: string
      ecs_service_name:
        description: "ECS service name"
        required: false
        default: "dotnet-rag-agent"
        type: string

jobs:
  destroy:
    name: Destroy application infra
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'DESTROY' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_INFRA_ROLE_ARN }}
          aws-region: ${{ github.event.inputs.aws_region || 'us-east-1' }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "1.5.0"
          terraform_wrapper: false

      - name: Import existing resources into state (best effort)
        working-directory: infra
        env:
          AWS_REGION: ${{ github.event.inputs.aws_region || 'us-east-1' }}
          VECTOR_BUCKET_NAME: ${{ github.event.inputs.vector_bucket_name || 'posts-semantic-search' }}
          VECTOR_INDEX_NAME: ${{ github.event.inputs.vector_index_name || 'posts-content-index' }}
          ECR_REPOSITORY_NAME: ${{ github.event.inputs.ecr_repository_name || 'dotnet-rag-agent' }}
          ECS_CLUSTER_NAME: ${{ github.event.inputs.ecs_cluster_name || 'dotnet-rag-agent' }}
          ECS_SERVICE_NAME: ${{ github.event.inputs.ecs_service_name || 'dotnet-rag-agent' }}
        run: |
          terraform init -reconfigure

          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET_ADDRESS="module.s3_vectors.aws_s3vectors_vector_bucket.vector_bucket"
          INDEX_ADDRESS="module.s3_vectors.aws_s3vectors_index.vector_index"
          ECR_ADDRESS="aws_ecr_repository.api"
          ECS_CLUSTER_ADDRESS="aws_ecs_cluster.api"
          ECS_SERVICE_ADDRESS="aws_ecs_service.api"
          VECTOR_BUCKET_EXISTS="false"

          if ! terraform state show "$BUCKET_ADDRESS" >/dev/null 2>&1; then
            BUCKET_FOUND=$(aws s3vectors list-vector-buckets \
              --region "$AWS_REGION" \
              --query "vectorBuckets[?vectorBucketName=='$VECTOR_BUCKET_NAME'].vectorBucketName | [0]" \
              --output text 2>/dev/null || true)
            if [ "$BUCKET_FOUND" != "None" ] && [ -n "$BUCKET_FOUND" ]; then
              VECTOR_BUCKET_EXISTS="true"
              terraform import "$BUCKET_ADDRESS" "arn:aws:s3vectors:$AWS_REGION:$ACCOUNT_ID:bucket/$VECTOR_BUCKET_NAME"
            fi
          else
            VECTOR_BUCKET_EXISTS="true"
          fi

          if ! terraform state show "$INDEX_ADDRESS" >/dev/null 2>&1; then
            if [ "$VECTOR_BUCKET_EXISTS" = "true" ]; then
              INDEX_FOUND=$(aws s3vectors list-indexes \
                --region "$AWS_REGION" \
                --vector-bucket-name "$VECTOR_BUCKET_NAME" \
                --query "indexes[?indexName=='$VECTOR_INDEX_NAME'].indexName | [0]" \
                --output text 2>/dev/null || true)
              if [ "$INDEX_FOUND" != "None" ] && [ -n "$INDEX_FOUND" ]; then
                terraform import "$INDEX_ADDRESS" "arn:aws:s3vectors:$AWS_REGION:$ACCOUNT_ID:bucket/$VECTOR_BUCKET_NAME/index/$VECTOR_INDEX_NAME"
              fi
            fi
          fi

          if ! terraform state show "$ECR_ADDRESS" >/dev/null 2>&1; then
            if aws ecr describe-repositories --region "$AWS_REGION" --repository-names "$ECR_REPOSITORY_NAME" >/dev/null 2>&1; then
              terraform import "$ECR_ADDRESS" "$ECR_REPOSITORY_NAME"
            fi
          fi

          if ! terraform state show "$ECS_CLUSTER_ADDRESS" >/dev/null 2>&1; then
            CLUSTER_ARN=$(aws ecs describe-clusters \
              --region "$AWS_REGION" \
              --clusters "$ECS_CLUSTER_NAME" \
              --query "clusters[?status=='ACTIVE'].clusterArn | [0]" \
              --output text 2>/dev/null || true)
            if [ "$CLUSTER_ARN" != "None" ] && [ -n "$CLUSTER_ARN" ]; then
              terraform import "$ECS_CLUSTER_ADDRESS" "$CLUSTER_ARN"
            fi
          fi

          if ! terraform state show "$ECS_SERVICE_ADDRESS" >/dev/null 2>&1; then
            SERVICE_ARN=$(aws ecs describe-services \
              --region "$AWS_REGION" \
              --cluster "$ECS_CLUSTER_NAME" \
              --services "$ECS_SERVICE_NAME" \
              --query "services[?status=='ACTIVE'].serviceArn | [0]" \
              --output text 2>/dev/null || true)
            if [ "$SERVICE_ARN" != "None" ] && [ -n "$SERVICE_ARN" ]; then
              terraform import "$ECS_SERVICE_ADDRESS" "$ECS_CLUSTER_NAME/$ECS_SERVICE_NAME"
            fi
          fi

      - name: Drain ECS tasks and deregister task definitions
        env:
          AWS_REGION: ${{ github.event.inputs.aws_region || 'us-east-1' }}
          ECS_CLUSTER_NAME: ${{ github.event.inputs.ecs_cluster_name || 'dotnet-rag-agent' }}
          ECS_SERVICE_NAME: ${{ github.event.inputs.ecs_service_name || 'dotnet-rag-agent' }}
        run: |
          # Scale service to 0 so all running tasks stop before we destroy
          SERVICE_STATUS=$(aws ecs describe-services \
            --region "$AWS_REGION" \
            --cluster "$ECS_CLUSTER_NAME" \
            --services "$ECS_SERVICE_NAME" \
            --query "services[0].status" \
            --output text 2>/dev/null || echo "MISSING")

          if [ "$SERVICE_STATUS" = "ACTIVE" ]; then
            echo "Scaling ECS service to 0..."
            aws ecs update-service \
              --region "$AWS_REGION" \
              --cluster "$ECS_CLUSTER_NAME" \
              --service "$ECS_SERVICE_NAME" \
              --desired-count 0 >/dev/null

            echo "Waiting for tasks to drain..."
            aws ecs wait services-stable \
              --region "$AWS_REGION" \
              --cluster "$ECS_CLUSTER_NAME" \
              --services "$ECS_SERVICE_NAME"
          else
            echo "ECS service not found or not active — skipping drain."
          fi

          # Deregister all task definition revisions (CI/CD registers these outside Terraform)
          TASK_DEF_ARNS=$(aws ecs list-task-definitions \
            --region "$AWS_REGION" \
            --family-prefix "$ECS_SERVICE_NAME" \
            --query 'taskDefinitionArns[]' \
            --output text 2>/dev/null || true)

          for ARN in $TASK_DEF_ARNS; do
            aws ecs deregister-task-definition \
              --region "$AWS_REGION" \
              --task-definition "$ARN" >/dev/null
            echo "Deregistered $ARN"
          done

      - name: Destroy application infrastructure
        working-directory: infra
        env:
          DESTROY_CONFIRM: "YES"
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_BRANCH: ${{ github.ref }}
          AWS_REGION: ${{ github.event.inputs.aws_region || 'us-east-1' }}
          VECTOR_BUCKET_NAME: ${{ github.event.inputs.vector_bucket_name || 'posts-semantic-search' }}
          VECTOR_INDEX_NAME: ${{ github.event.inputs.vector_index_name || 'posts-content-index' }}
          ECR_REPOSITORY_NAME: ${{ github.event.inputs.ecr_repository_name || 'dotnet-rag-agent' }}
          ECS_CLUSTER_NAME: ${{ github.event.inputs.ecs_cluster_name || 'dotnet-rag-agent' }}
          ECS_SERVICE_NAME: ${{ github.event.inputs.ecs_service_name || 'dotnet-rag-agent' }}
        run: |
          bash ./destroy-app-stack.sh
